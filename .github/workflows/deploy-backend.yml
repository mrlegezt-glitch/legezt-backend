name: Deploy Express Backend to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Backend
        run: |
          npm install
          npx prisma generate
          npm run build

      - name: Zip Backend Artifacts
        run: |
          mkdir deploy_dir
          cp -r dist deploy_dir/
          cp -r prisma deploy_dir/
          cp package.json deploy_dir/
          cd deploy_dir
          zip -r ../deploy.zip .
          cd ..

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'legezt-backend-api'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: './deploy.zip'
